services:
  - type: web
    name: todo-ai-chatbot-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        sync: false          # Paste your Neon postgresql:// URL here in Render dashboard
      - key: OPENROUTER_API_KEY
        sync: false          # Set in Render dashboard
      - key: OPENROUTER_MODEL
        value: openrouter/auto
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: API_HOST
        value: "0.0.0.0"
      - key: CORS_ORIGINS
        sync: false          # Set to your Vercel URL: https://todo-ai-chatbot.vercel.app
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
